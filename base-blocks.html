<!DOCTYPE html>
<html lang="kk">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>База курс</title>

<style>

body{
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#e5dbff,#f0ebff);
margin:0;
padding:20px;
}

h1{
text-align:center;
color:#7f3ff0;
}

.selectors{
display:flex;
gap:12px;
margin:20px 0;
flex-wrap:wrap;
justify-content:center;
}

.selectors select{
padding:10px 12px;
border-radius:12px;
border:1px solid #ccc;
font-size:14px;
background:white;
}

#blocks{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:12px;
margin-top:18px;
}

.block{
background:#fff;
padding:12px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,.12);
}

.block-title{
font-weight:bold;
margin-bottom:6px;
}

button{
width:100%;
padding:8px;
margin-top:6px;
border:none;
border-radius:10px;
cursor:pointer;
}

.video-btn{background:#7f3ff0;color:white}
.audio-btn{background:#22c55e;color:white}
.doc-btn{background:#f97316;color:white}
.upload-btn{background:#0ea5e9;color:white}

#viewerModal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
z-index:9999;
justify-content:center;
align-items:center;
}

#viewerBox{
background:#fff;
width:90%;
height:85%;
border-radius:15px;
padding:10px;
position:relative;
}

#viewerBox iframe,
#viewerBox video,
#viewerBox audio{
width:100%;
height:100%;
border:none;
border-radius:10px;
}

.closeBtn{
position:absolute;
top:8px;
right:12px;
background:red;
color:white;
border:none;
padding:5px 10px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Менің курстарым — База</h1>

<div class="selectors">

<select id="gradeSelect">

<option value="5">5 сынып</option>
<option value="6">6 сынып</option>
<option value="7">7 сынып</option>

</select>

<select id="subjectSelect"></select>

</div>

<div id="blocks"></div>

<div id="viewerModal">

<div id="viewerBox">

<button class="closeBtn" onclick="closeViewer()">✕</button>

<div id="viewerContent"></div>

</div>

</div>

<script>

function normalizePkg(pkg){
  const p = String(pkg || "").toLowerCase().trim();
  if(p === "baza") return "base";
  if(p === "standard") return "standart";
  return p;
}

function canOpenCoursePage(pkg, pageCourse){
  const p = normalizePkg(pkg);

  if(pageCourse === "base"){
    return p === "base" || p === "standart" || p === "premium";
  }

  if(pageCourse === "standart"){
    return p === "standart" || p === "premium";
  }

  if(pageCourse === "premium"){
    return p === "premium";
  }

  return false;
}

function fillGradeOptionsForPage(pageCourse, studentGrade){
  const select = document.getElementById("gradeSelect");
  if(!select) return;

  const g = Number(studentGrade || 5);
  let grades = [];

  if(pageCourse === "base"){
    if(g >= 5) grades.push(5);
    if(g >= 6) grades.push(6);
    if(g >= 7) grades.push(7);
  }

  if(pageCourse === "standart"){
    if(g >= 8) grades.push(8);
    if(g >= 9) grades.push(9);
  }

  if(pageCourse === "premium"){
    if(g >= 10) grades.push(10);
    if(g >= 11) grades.push(11);
  }

  select.innerHTML = grades
    .map(x => `<option value="${x}">${x} сынып</option>`)
    .join("");
}

const gradeSelect = document.getElementById("gradeSelect")
const subjectSelect = document.getElementById("subjectSelect")
const blocksDiv = document.getElementById("blocks")


function updateSubjects(){

const g = Number(gradeSelect.value)

subjectSelect.innerHTML=""

if(g===5 || g===6){

const opt=document.createElement("option")
opt.value="math"
opt.textContent="Математика"
subjectSelect.appendChild(opt)

}else{

const a=document.createElement("option")
a.value="algebra"
a.textContent="Алгебра"

const geo=document.createElement("option")
geo.value="geometry"
geo.textContent="Геометрия"

subjectSelect.appendChild(a)
subjectSelect.appendChild(geo)

}

/* FIX 1 */
subjectSelect.value = subjectSelect.options[0].value

renderBlocks()

}


async function renderBlocks(){

blocksDiv.innerHTML=""

const grade=gradeSelect.value
const subject=subjectSelect.value

let total=50

if(grade==="7" && subject==="algebra") total=25
if(grade==="7" && subject==="geometry") total=25


for(let i=1;i<=total;i++){

const block=document.createElement("div")
block.className="block"

const title=document.createElement("div")
title.className="block-title"
title.textContent=`Блок ${i}`

block.appendChild(title)


const data=await fetch(`/api/materials?grade=${grade}&subject=${subject}&blockNumber=${i}`,{
credentials:"include"
})
.then(r=>r.json())
.catch(()=>({videos:[],audios:[],docs:[]}))


// VIDEO

if(data.videos?.length){

const vBtn=document.createElement("button")
vBtn.className="video-btn"
vBtn.textContent="Видеоны көру"

vBtn.onclick=()=>openVideo(data.videos[data.videos.length-1].url)

block.appendChild(vBtn)

}


// AUDIO

if(data.audios?.length){

const aBtn=document.createElement("button")
aBtn.className="audio-btn"
aBtn.textContent="Аудио тыңдау"

aBtn.onclick=()=>openAudio(data.audios[data.audios.length-1].url)

block.appendChild(aBtn)

}


// DOC

if(data.docs?.length){

const dBtn=document.createElement("button")
dBtn.className="doc-btn"
dBtn.textContent="Тапсырманы ашу"

dBtn.onclick=()=>openDoc(data.docs[data.docs.length-1].url)

block.appendChild(dBtn)

}


// UPLOAD

const uBtn=document.createElement("button")
uBtn.className="upload-btn"
uBtn.textContent="Тапсырма жүктеу"

uBtn.onclick=()=>{

const input=document.createElement("input")
input.type="file"

input.onchange=async()=>{

const file=input.files[0]

const fd=new FormData()

fd.append("grade",grade)
fd.append("subject",subject)
fd.append("blockNumber",i)
fd.append("file",file)

await fetch("/api/student/upload",{
method:"POST",
body:fd,
credentials:"include"
})

alert("Тапсырма жүктелді")

/* FIX 2 */
renderBlocks()

}

input.click()

}

block.appendChild(uBtn)


blocksDiv.appendChild(block)

}

}



function openVideo(url){

document.getElementById("viewerContent").innerHTML=`

<video controls>

<source src="${url}">

</video>

`

document.getElementById("viewerModal").style.display="flex"

}


function openAudio(url){

document.getElementById("viewerContent").innerHTML=`

<audio controls>

<source src="${url}">

</audio>

`

document.getElementById("viewerModal").style.display="flex"

}


function openDoc(url){

document.getElementById("viewerContent").innerHTML=`

<iframe src="${url}"></iframe>

`

document.getElementById("viewerModal").style.display="flex"

}


function closeViewer(){

document.getElementById("viewerModal").style.display="none"
document.getElementById("viewerContent").innerHTML=""

}


gradeSelect.addEventListener("change",updateSubjects)
subjectSelect.addEventListener("change",renderBlocks)

(async ()=>{

const me = await fetch("/api/auth/me",{
credentials:"include",
cache:"no-store"
}).then(r=>r.json()).catch(()=>null)

if(!me?.user){
window.location.href="index.html"
return
}

const sessionUser = me.user
const effectivePackage = String(sessionUser.package || "pending").toLowerCase()
const studentGrade = Number(sessionUser.grade || 5)

if(!(effectivePackage === "base" || effectivePackage === "baza" || effectivePackage === "standart" || effectivePackage === "standard" || effectivePackage === "premium")){
window.location.href="dashboard.html"
return
}

let allowedGrades=[]

if(studentGrade>=5) allowedGrades.push(5)
if(studentGrade>=6) allowedGrades.push(6)
if(studentGrade>=7) allowedGrades.push(7)

gradeSelect.innerHTML = allowedGrades
.map(g=>`<option value="${g}">${g} сынып</option>`)
.join("")

updateSubjects()

})()

</script>

</body>
</html>
