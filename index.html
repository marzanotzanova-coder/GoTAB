<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoTAB</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Arial', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #fafcff 0%, #f6f3ff 35%, #eefcff 70%, #f8fffc 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  .lang-wrap {
    position: absolute;
    top: 18px;
    right: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: rgba(255,255,255,0.9);
    border-radius: 20px;
    border: 1px solid rgba(90,120,255,0.14);
    box-shadow: 0 4px 16px rgba(90,120,255,0.07);
    z-index: 10;
  }
  .lang-wrap select {
    border: none;
    background: transparent;
    font-size: 14px;
    font-weight: 600;
    color: #14213D;
    cursor: pointer;
    outline: none;
  }

  .sp {
    position: absolute;
    color: #8A5CFF;
    opacity: 0.45;
    pointer-events: none;
    font-style: normal;
  }

  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 90px;
    z-index: 1;
  }

  .gotab-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .logo-go {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #2F6BFF, #20C9FF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .logo-tab {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #20C9FF, #1DE9B6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .subtitle {
    font-size: 17px;
    margin-bottom: 52px;
    letter-spacing: 0.5px;
  }
  .subtitle .s-blue { color: #2F6BFF; }
  .subtitle .s-cyan { color: #20C9FF; }
  .subtitle .s-mint { color: #1DE9B6; }

  .btn-main {
    display: block;
    width: 320px;
    padding: 17px;
    margin-bottom: 14px;
    border: none;
    border-radius: 20px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    color: white;
    background: linear-gradient(90deg, #2F6BFF 0%, #20C9FF 60%, #1DE9B6 100%);
    box-shadow: 0 10px 30px rgba(47,107,255,0.26);
    transition: transform 0.18s, box-shadow 0.18s;
  }
  .btn-main:hover { transform: translateY(-2px); box-shadow: 0 14px 36px rgba(47,107,255,0.34); }

  .btn-outline {
    display: block;
    width: 320px;
    padding: 17px;
    border: 2px solid #2F6BFF;
    border-radius: 20px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    color: #2F6BFF;
    background: white;
    transition: transform 0.18s, background 0.18s;
  }
  .btn-outline:hover { transform: translateY(-2px); background: rgba(47,107,255,0.04); }

  .mountain-area {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    pointer-events: none;
    z-index: 0;
  }
  .cloud-left, .cloud-right {
    position: absolute;
    bottom: 165px;
    opacity: 0.72;
  }
  .cloud-left { left: 6%; }
  .cloud-right { right: 6%; }

  @media (max-width: 480px) {
    .logo-go, .logo-tab { font-size: 52px; }
    .btn-main, .btn-outline { width: 280px; }
    .center { margin-top: 70px; }
  }
</style>
</head>
<body>

<div class="lang-wrap">
  🌐
  <select id="langSelect">
    <option value="kk">Қазақша</option>
    <option value="ru">Русский</option>
  </select>
</div>

<i class="sp" style="top:11%;left:9%;font-size:16px">✦</i>
<i class="sp" style="top:18%;right:13%;font-size:11px;color:#20C9FF">✦</i>
<i class="sp" style="top:32%;left:16%;font-size:9px">✦</i>
<i class="sp" style="top:22%;left:43%;font-size:8px;color:#1DE9B6">✦</i>
<i class="sp" style="top:40%;right:18%;font-size:12px;color:#1DE9B6">✦</i>
<i class="sp" style="bottom:40%;left:22%;font-size:10px;color:#20C9FF">✦</i>
<i class="sp" style="bottom:44%;right:15%;font-size:8px">✦</i>

<div class="center">
  <div class="gotab-logo">
    <img src="images/logo.png" alt="GoTAB" style="height:180px;width:auto;mix-blend-mode:multiply;">
  </div>
  <button class="btn-main" id="loginBtn" data-i18n="btnLogin">Кіру</button>
  <button class="btn-outline" id="registerBtn" data-i18n="btnRegister">Тіркелу</button>
</div>

<div class="mountain-area">
  <img src="images/mountain.png" alt="" style="width:480px;max-width:90vw;mix-blend-mode:screen;">
</div>

<script src="lang.js"></script>
<script>
document.getElementById("loginBtn").addEventListener("click", () => { window.location.href = "login.html"; });
document.getElementById("registerBtn").addEventListener("click", () => { window.location.href = "register.html"; });
</script>
</body>
</html>
