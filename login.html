<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoTAB - Вход / Регистрация</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Тіл таңдау оң жақ жоғарғы шет -->
  <div style="position:absolute; top:10px; right:10px;">
    <select id="langSelect">
      <option value="kk">Қазақша</option>
      <option value="ru">Русский</option>
    </select>
  </div>

  <div class="container">
    <div class="login-card">
      <h1 class="logo">GoTAB</h1>
      <p class="tagline" id="titleText">Оқу • Бағалау • Өсу</p>

      <!-- Негізгі форма -->
      <form id="login-form">
        <div class="input-group">
          <input type="text" id="phone" placeholder="Телефон номер" required>
        </div>
        <div class="input-group">
          <input type="email" id="email" placeholder="Email" required>
        </div>

        <!-- Пароль бастында жасырын -->
        <div id="password-block" style="display:none;">
          <div class="input-group">
            <input type="password" id="password" placeholder="Пароль">
          </div>
          <p id="forgot" style="color:blue; cursor:pointer; display:none;">
            Парольді ұмыттыңыз ба?
          </p>
        </div>

        <button type="submit" class="btn-login">Вход</button>
        <button type="button" id="register-btn" class="btn-register">Регистрация</button>
      </form>

      <p id="error" style="color:red;"></p>
    </div>
  </div>

  <!-- JS қосу -->
  <script src="lang.js"></script>
  <script src="script.js"></script>
</body>
</html>
